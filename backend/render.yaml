services:
  - type: web
    name: social-listening-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: SECRET_KEY
        sync: false   # set manually in Render dashboard
      - key: FRONTEND_URL
        value: https://social-listening-azure.vercel.app
